services:
  - type: web
    name: lottobot-unofficial-endpoint
    runtime: docker
    dockerContext: ./unofficial-endpoint
    dockerfilePath: ./unofficial-endpoint/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: UNOFFICIAL_AUTH_TOKEN
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
